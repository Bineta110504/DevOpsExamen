name: Titanic Dashboard CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # JOB 1: Lint & Test
  # ============================================
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-cov
    
    - name: Create logs directory
      run: mkdir -p logs
    
    - name: Lint with flake8
      run: |
        flake8 app.py --count --max-line-length=127 --statistics || true
        flake8 data/ --count --max-line-length=127 --statistics || true
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --tb=short

   # ============================================
  # JOB 2: Generate Report
  # ============================================
  generate-report:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pandas seaborn ydata-profiling
    
    - name: Generate HTML report
      run: |
        python - <<'EOF'
        import seaborn as sns
        import pandas as pd
        from ydata_profiling import ProfileReport

        print('📊 Loading Titanic dataset...')
        df = sns.load_dataset('titanic')

        print('🧹 Cleaning data...')
        df['age'].fillna(df['age'].median(), inplace=True)
        df['embarked'].fillna(df['embarked'].mode()[0], inplace=True)
        df['deck'] = df['deck'].astype(str).fillna('Unknown')

        print('📝 Generating report...')
        profile = ProfileReport(df, title='Titanic Dataset Report', explorative=True)
        profile.to_file('titanic-report.html')

        print('✅ Report generated: titanic-report.html')
        EOF
    
    - name: Upload report as artifact (GitHub)
      uses: actions/upload-artifact@v4
      with:
        name: titanic-report
        path: titanic-report.html
    
    - name: Upload report to Nexus
      if: false
      env:
        NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
        NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        NEXUS_URL: ${{ secrets.NEXUS_URL }}
      run: |
        echo "📤 Upload du rapport vers Nexus..."
        
        if [ -f "titanic-report.html" ]; then
          echo "✅ Fichier trouvé: titanic-report.html"
          ls -la titanic-report.html
        else
          echo "❌ Fichier non trouvé!"
          exit 1
        fi
        
        curl -v -u $NEXUS_USER:$NEXUS_PASS \
          --upload-file titanic-report.html \
          "$NEXUS_URL/repository/titanic-reports/titanic-report-v${{ github.run_number }}.html"
        
        if [ $? -eq 0 ]; then
          echo "✅ Rapport uploadé avec succès vers Nexus"
          echo "📍 URL: $NEXUS_URL/repository/titanic-reports/titanic-report-v${{ github.run_number }}.html"
        else
          echo "⚠️ Échec de l'upload vers Nexus"
        fi

  # ============================================
  # JOB 3: Docker Build & Push to DockerHub
  # ============================================
  docker-build-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/titanic-dashboard:latest
          ${{ secrets.DOCKER_USERNAME }}/titanic-dashboard:${{ github.sha }}

  # ============================================
  # JOB 4: Deploy with Docker Compose
  # ============================================
  deploy:
    needs: [docker-build-push, generate-report]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create docker-compose.yml
      run: |
        cat > docker-compose.yml << 'EOF'
        version: '3.8'
        services:
          app:
            image: ${{ secrets.DOCKER_USERNAME }}/titanic-dashboard:latest
            ports:
              - "8501:8501"
            volumes:
              - ./logs:/app/logs
            restart: unless-stopped
        EOF
    
    - name: Pull latest image
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/titanic-dashboard:latest
    
    - name: Stop old container
      run: |
        docker stop titanic-app 2>/dev/null || true
        docker rm titanic-app 2>/dev/null || true
    
    - name: Run new container
      run: |
        docker run -d \
          --name titanic-app \
          -p 8501:8501 \
          -v $(pwd)/logs:/app/logs \
          --restart unless-stopped \
          ${{ secrets.DOCKER_USERNAME }}/titanic-dashboard:latest
    
    - name: Health check
      run: |
        sleep 15
        curl -f http://localhost:8501 || (docker logs titanic-app && exit 1)
        echo "✅ Application deployed successfully!"
name: CI/CD Titanic Dashboard

on:
  push:
    branches: ["main"]

jobs:

  # =========================
  # 🧪 JOB 1 : LINT & TEST
  # =========================
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ Lint NON BLOQUANT
      - name: Run flake8 (Lint)
        run: |
          flake8 . || echo "⚠️ Lint errors detected but ignored"

      # ✅ Tests (reste bloquant → normal)
      - name: Run tests
        run: pytest tests/

  # =========================
  # 📊 JOB 2 : RAPPORT
  # =========================
  report:
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report
        run: python generate_report.py

      - name: Upload artifact (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: titanic-report
          path: report.html

      # 👉 Upload vers Nexus (optionnel si pas configuré)
      - name: Upload to Nexus
        run: |
          curl -u ${{ secrets.NEXUS_USER }}:${{ secrets.NEXUS_PASS }} \
          --upload-file report.html \
          http://YOUR_NEXUS_URL/repository/reports/titanic-report-v1.0.html

  # =========================
  # 🐳 JOB 3 : DOCKER BUILD & PUSH
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: report

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      # ✅ Build SANS CACHE (important pour voir les modifs)
      - name: Build image
        run: docker build --no-cache -t ${{ secrets.DOCKER_USER }}/titanic-dashboard:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USER }}/titanic-dashboard:${{ github.sha }}

  # =========================
  # 🚀 JOB 4 : DEPLOY
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          script: |
            docker pull ${{ secrets.DOCKER_USER }}/titanic-dashboard:${{ github.sha }}
            docker-compose down
            docker-compose up -d
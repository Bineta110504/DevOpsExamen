name: Titanic Dashboard CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: titanic-dashboard
  DOCKER_TAG: latest

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Create requirements.txt
      run: |
        cat > requirements.txt << EOF
        streamlit==1.29.0
        pandas==2.0.3
        plotly==5.18.0
        seaborn==0.12.2
        pytest==7.4.3
        pytest-cov==4.1.0
        flake8==6.1.0
        ydata-profiling==4.6.0
        numpy==1.24.3
        EOF
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p data tests logs
        touch data/__init__.py tests/__init__.py
    
    - name: Create loader.py
      run: |
        cat > data/loader.py << EOF
        import seaborn as sns
        import pandas as pd
        
        def load_titanic_data():
            df = sns.load_dataset('titanic')
            df = df.copy()
            
            df['age'].fillna(df['age'].median(), inplace=True)
            df['embarked'].fillna(df['embarked'].mode()[0], inplace=True)
            df['deck'] = df['deck'].astype(str).fillna('Unknown')
            
            df['age_group'] = pd.cut(df['age'], 
                                     bins=[0, 12, 18, 35, 60, 100],
                                     labels=['Enfant', 'Adolescent', 'Adulte', 'Adulte+', 'Senior'])
            
            return df
        
        def get_data_info(df):
            return {
                'total_passagers': len(df),
                'survie_rate': df['survived'].mean() * 100,
                'age_moyen': df['age'].mean(),
                'hommes': len(df[df['sex'] == 'male']),
                'femmes': len(df[df['sex'] == 'female'])
            }
        EOF
    
    - name: Create test file
      run: |
        cat > tests/test_loader.py << EOF
        import pytest
        import sys
        import os
        
        sys.path.insert(0, os.path.abspath(os.path.join(os.path.dirname(__file__), '..')))
        
        from data.loader import load_titanic_data, get_data_info
        
        def test_load_data():
            df = load_titanic_data()
            assert df is not None
            assert len(df) == 891
        
        def test_columns():
            df = load_titanic_data()
            assert 'survived' in df.columns
            assert 'age_group' in df.columns
        
        def test_no_nulls():
            df = load_titanic_data()
            assert df['age'].isnull().sum() == 0
            assert df['embarked'].isnull().sum() == 0
        EOF
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app.py --count --max-line-length=127 --statistics || true
        flake8 data/ --count --max-line-length=127 --statistics || true
    
    - name: Test with pytest
      run: |
        pip install pytest pytest-cov
        pytest tests/ -v --tb=short